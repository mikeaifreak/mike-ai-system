version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mikeai}
      POSTGRES_USER: ${POSTGRES_USER:-mikeai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mikeai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mission-control-backend:
    build: ./dashboard/backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  mission-control-frontend:
    build: ./dashboard/frontend
    ports:
      - "3000:3000"
    depends_on:
      - mission-control-backend
    restart: always

  scheduler:
    build: ./scripts/python
    env_file: .env
    environment:
      - SCHEDULER_TIMEZONE=${SCHEDULER_TIMEZONE:-UTC}
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
