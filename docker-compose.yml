version: "3.9"

services:
  postgres:
    image: postgres:15
    restart: always
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"

  scheduler:
    build: ./scripts/python
    restart: always
    env_file: .env
    depends_on:
      - postgres
    command: python scheduler.py

  dashboard-backend:
    build: ./dashboard/backend
    restart: always
    env_file: .env
    depends_on:
      - postgres
    ports:
      - "8000:8000"

  dashboard-frontend:
    build: ./dashboard/frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - dashboard-backend

volumes:
  postgres_data:
